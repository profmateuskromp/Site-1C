<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felipe "melhor" aluno</title>
    <style>
        header {
            background-color: darkred;
            color: azure;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #000000;
            padding: 16px;
        }
        main {
           background-color: azure;
            color: darkred;
            text-align: center;
            margin: 0 auto; 
    
        }
        img {
            width: 180px;
            height: 180px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Felipe "querido"</h1>
        <p>Esse site para o meu aluno especial, que ama minhas aulas</p>
        <p>Ele é perfeito e não tem defeitos</p>
    </header>
    <main>
        <img src="post1.png" alt="icone de computador">
        
        <div>
            <h2>Meu primeiro post</h2>
            <p>editado por Mateus</p>
            <p>Boas-vindas ao meu blog! Aqui vou compartilhar sobre tecnologia e computação</p>
            <button>❤️ <span>0</span></button>
            <button>👍 <span>0</span></button>
        </div>

    </main>
</body>

<script>
    const botao = document.querySelector("button");
    botao.addEventListener("click",botaoClicado);

    function botaoClicado () {
        console.log("fui clicado");
        let texto = botao.querySelector("span");
        texto.textContent++;
    }
</script>

</html>
